<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notes IUT — Simulateur</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0369a1" />
    <meta name="color-scheme" content="light dark" />
    <script>
      (function () {
        var dark;
        try {
          var stored = localStorage.getItem("notes-iut-theme");
          dark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
        } catch (e) {
          dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        }
        // Applique immédiatement le fond correct AVANT que le CSS Tailwind se charge :
        // sans ça, Firefox en dark mode affiche un canvas noir (color-scheme: dark) pendant
        // le chargement du JS/CSS, d'où l'écran noir signalé. Chrome démarre en blanc par
        // défaut, donc l'effet est moins visible — mais Firefox respecte strictement la
        // couleur de fond du navigateur selon le color-scheme système.
        if (dark) {
          document.documentElement.classList.add("dark");
          document.documentElement.style.background = "#020617";
        } else {
          document.documentElement.style.background = "#f0f9ff";
        }
      })();
    </script>
  </head>
  <body class="bg-sky-50 dark:bg-slate-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
